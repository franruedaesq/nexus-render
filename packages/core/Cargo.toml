[package]
name = "nexus-render-core"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = { version = "2", default-features = false, features = ["napi6"] }
napi-derive = "2"
tokio = { version = "1", features = ["rt", "rt-multi-thread", "macros"] }
wgpu = { version = "28", default-features = false, features = ["vulkan", "metal", "wgsl"] }
pollster = "0.4"
glam = "0.32"
gltf = "1.4.1"
image = { version = "0.25.9", default-features = false, features = ["jpeg"] }

[build-dependencies]
napi-build = "2"
